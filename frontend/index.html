<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101c22" />
    <title>智价AI</title>
    <link href="https://fonts.loli.net/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.loli.net/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- SPA redirect handler for GitHub Pages 404.html -->
    <script>
      (function(){
        var redir = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redir && redir !== location.href) {
          history.replaceState(null, null, redir);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
